name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend - Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/cooking-nest-app/package-lock.json

      - name: Install dependencies
        working-directory: backend/cooking-nest-app
        run: npm ci

      - name: Build
        working-directory: backend/cooking-nest-app
        run: npx nest build

      - name: Unit tests
        working-directory: backend/cooking-nest-app
        run: npm run test

      - name: E2E tests
        working-directory: backend/cooking-nest-app
        run: npx jest --config ./test/jest-e2e.json

  frontend-build:
    name: Frontend - Build & Component Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/cooking-vue-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/cooking-vue-app
        run: npm ci

      - name: Build
        working-directory: frontend/cooking-vue-app
        run: npm run build

      - name: Component tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend/cooking-vue-app
          component: true
          install: false

  frontend-e2e:
    name: Frontend - E2E Tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            backend/cooking-nest-app/package-lock.json
            frontend/cooking-vue-app/package-lock.json

      - name: Install backend dependencies
        working-directory: backend/cooking-nest-app
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend/cooking-vue-app
        run: npm ci

      - name: Build backend
        working-directory: backend/cooking-nest-app
        run: npx nest build

      - name: Start backend
        working-directory: backend/cooking-nest-app
        run: node dist/main &
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DBNAME: cooking

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 && break
            sleep 1
          done

      - name: Build frontend
        working-directory: frontend/cooking-vue-app
        run: npm run build-only

      - name: E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend/cooking-vue-app
          install: false
          start: npm run preview
          wait-on: 'http://localhost:4173'

